<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L31 HW task2</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div>
    <form action="">
        <label for="Name">
            <input type="text" name="Name" id="Name" placeholder="Your Name">
        </label>

        <label for="Subject">
            <input type="text" name="Subject" id="Subject" placeholder="Subject">
        </label>

        <label for="Email">
            <input type="email" name="Email" id="Email" placeholder="Your Email">
        </label>

        <label for="Phone">
            <input type="tel" name="Phone" id="Phone" placeholder="Your Phone">
        </label>

        <textarea name="Message" id="Message" rows="8" cols="25" placeholder="Your Message"></textarea>
        
        <button type="submit"><b>Send Message</b></button>
    </form>
    </div>
</body>
</html>
