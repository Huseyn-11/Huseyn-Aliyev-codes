<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L29 HW</title>
    <link rel="stylesheet" href="./style2.css">
</head>
<body>
    <form action="">
        <label for="username"></label>
        <input type="text" id="username" name="Name" minlength="3" maxlength="20" required placeholder="Enter your name">

        <label for="surname"></label>
        <input type="text" id="surname" name="Surname" minlength="5" maxlength="20" placeholder="Enter your surname">

        <label for="Age"></label>
        <input type="number" id="Age" name="Age" min="18" max="100" required placeholder="Age">

        <label for="password"></label>
        <input type="password" id="password" name="Password" required placeholder="Enter your password">

        <label for="email"></label>
        <input type="email" id="email" name="Email" required placeholder="Enter your email">
         
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </form>
</body>
</html>
